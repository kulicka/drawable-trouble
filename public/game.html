<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drawable Trouble</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css?v=2026-05-25f" />
</head>
<body class="game-page">

  <header class="game-header">
    <div class="header-left">
      <button class="mob-panel-btn" id="mob-players-btn" aria-label="Toggle players">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </button>
      <div class="game-logo">
        <div class="game-logo-mark">
          <svg width="22" height="22" viewBox="0 0 52 52" fill="none" aria-hidden="true">
            <path d="M26 8 L29 20 L41 20 L31 28 L35 40 L26 33 L17 40 L21 28 L11 20 L23 20 Z" fill="#e879f9" opacity="0.25"/>
            <path d="M26 12 L28.5 21 L38 21 L30.5 26.5 L33 36 L26 30.5 L19 36 L21.5 26.5 L14 21 L23.5 21 Z" fill="#e879f9"/>
            <path d="M10 14 Q14 10 16 14" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" fill="none"/>
            <path d="M36 38 Q40 34 42 38" stroke="#f9a8d4" stroke-width="2" stroke-linecap="round" fill="none"/>
            <circle cx="10" cy="36" r="2" fill="#a78bfa"/>
            <circle cx="42" cy="14" r="2" fill="#f9a8d4"/>
          </svg>
        </div>
        <span class="game-brand-name">Drawable Trouble</span>
      </div>
      <button class="room-code-pill" id="btn-copy-room-code" type="button" title="Copy room code">
        <span id="game-room-code">—</span>
        <svg class="room-code-icon icon-copy" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        <svg class="room-code-icon icon-check" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </button>
    </div>
    <div class="header-center">
      <div id="word-display" class="word-display">Waiting...</div>
      <div id="round-display" class="round-display"></div>
    </div>
    <div class="header-right">
      <div id="timer" class="timer">--</div>
      <button class="mob-panel-btn" id="mob-chat-btn" aria-label="Toggle chat">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </button>
    </div>
  </header>

  <main class="game-main">

    <div id="panel-backdrop"></div>

    <aside class="players-panel" id="players-panel">
      <div class="panel-body">
        <button class="btn-leave-room hidden" id="btn-leave-room" type="button">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Leave room
        </button>
        <ul id="player-list"></ul>
      </div>
      <button class="panel-toggle-btn" id="toggle-players" aria-label="Toggle players panel">
        <svg class="chevron-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
    </aside>

    <section class="canvas-section">
      <div class="canvas-wrapper">
        <canvas id="game-canvas" width="800" height="550"></canvas>

        <div id="word-picker" class="word-picker hidden">
          <h3>Pick a word to draw:</h3>
          <div id="word-options" class="word-options"></div>
        </div>

        <div id="turn-overlay" class="turn-overlay hidden">
          <p id="turn-overlay-text"></p>
          <div id="play-again-controls" class="hidden" style="display:flex;flex-direction:column;align-items:center;gap:.6rem;">
            <label style="font-size:.85rem;color:var(--muted);display:flex;align-items:center;gap:.5rem;">
              Rounds
              <select id="rounds-select-game" style="background:var(--card);color:var(--text);border:none;border-radius:6px;padding:.3rem .6rem;font-size:.9rem;">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3" selected>3</option>
                <option value="4">4</option>
                <option value="5">5</option>
              </select>
            </label>
            <label style="font-size:.85rem;color:var(--muted);display:flex;align-items:center;gap:.5rem;">
              Difficulty
              <select id="difficulty-select-game" style="background:var(--card);color:var(--text);border:none;border-radius:6px;padding:.3rem .6rem;font-size:.9rem;">
                <option value="easy">Easy</option>
                <option value="medium" selected>Medium</option>
                <option value="hard">Hard</option>
                <option value="mixed">Mixed</option>
              </select>
            </label>
            <button id="btn-play-again" class="btn btn-primary">Play Again</button>
          </div>
        </div>
      </div>

      <div class="toolbar" id="toolbar">
        <button class="color-picker-trigger" id="color-picker-trigger" type="button" aria-label="Pick color" title="Pick color">
          <span class="current-color" id="current-color"></span>
        </button>
        <div class="color-swatches" id="color-swatches"></div>
        <input type="color" id="custom-color" value="#000000" title="Custom color" />
        <div class="divider"></div>
        <label>Size <input type="range" id="brush-size" min="2" max="40" value="6" /></label>
        <button class="tool-btn" id="btn-eraser" title="Eraser">⬜</button>
        <button class="tool-btn" id="btn-fill" title="Fill">🪣</button>
        <button class="tool-btn" id="btn-undo" title="Undo">↩️</button>
        <button class="tool-btn" id="btn-clear" title="Clear canvas">🗑️</button>
      </div>
    </section>

    <aside class="chat-panel" id="chat-panel">
      <button class="panel-toggle-btn" id="toggle-chat" aria-label="Toggle chat panel">
        <svg class="chevron-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>
      <div class="panel-body">
        <div id="chat-messages" class="chat-messages"></div>
        <form id="chat-form" class="chat-form">
          <input id="chat-input" type="text" placeholder="Type your guess..." maxlength="100" autocomplete="off" />
          <button type="submit" class="btn btn-primary">Send</button>
        </form>
      </div>
    </aside>

  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/canvas.js"></script>
  <script src="/js/game.js"></script>
</body>
</html>
