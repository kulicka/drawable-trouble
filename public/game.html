<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Drawable Trouble</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="/css/style.css?v=2026-05-29f" />
  <script>
    // Pin the page to the actual visible viewport on mobile Chrome.
    // window.visualViewport.height excludes browser chrome AND any virtual
    // keyboard, so it's more accurate than 100vh/100dvh in all states.
    (function () {
      var lastH = 0;
      function setAppVh() {
        var h = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
        document.documentElement.style.setProperty('--app-vh', h + 'px');
        // iOS Safari sometimes leaves the page scrolled after the soft keyboard
        // closes (visualViewport grew back), pushing the header above the
        // viewport. Force-snap back to the top whenever the visible area
        // expands or we get an orientation/resize event.
        if (h > lastH || h === lastH) {
          window.scrollTo(0, 0);
          if (document.scrollingElement) document.scrollingElement.scrollTop = 0;
        }
        lastH = h;
      }
      setAppVh();
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', setAppVh);
        window.visualViewport.addEventListener('scroll', setAppVh);
      }
      window.addEventListener('resize', setAppVh);
      window.addEventListener('orientationchange', setAppVh);
      // Also reset scroll when an input blurs (keyboard dismiss path)
      document.addEventListener('focusout', function () {
        setTimeout(setAppVh, 50);
      });
    })();
  </script>
</head>
<body class="game-page">

  <header class="game-header">
    <div class="header-left">
      <button class="mob-panel-btn" id="mob-players-btn" aria-label="Toggle players">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </button>
      <div class="game-logo">
        <div class="game-logo-mark">
          <svg width="22" height="22" viewBox="0 0 52 52" fill="none" aria-hidden="true">
            <path d="M26 8 L29 20 L41 20 L31 28 L35 40 L26 33 L17 40 L21 28 L11 20 L23 20 Z" fill="#e879f9" opacity="0.25"/>
            <path d="M26 12 L28.5 21 L38 21 L30.5 26.5 L33 36 L26 30.5 L19 36 L21.5 26.5 L14 21 L23.5 21 Z" fill="#e879f9"/>
            <path d="M10 14 Q14 10 16 14" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" fill="none"/>
            <path d="M36 38 Q40 34 42 38" stroke="#f9a8d4" stroke-width="2" stroke-linecap="round" fill="none"/>
            <circle cx="10" cy="36" r="2" fill="#a78bfa"/>
            <circle cx="42" cy="14" r="2" fill="#f9a8d4"/>
          </svg>
        </div>
        <span class="game-brand-name">Drawable Trouble</span>
      </div>
      <button class="room-code-pill" id="btn-copy-room-code" type="button" title="Copy room code">
        <span id="game-room-code">—</span>
        <svg class="room-code-icon icon-copy" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        <svg class="room-code-icon icon-check" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </button>
    </div>
    <div class="header-center">
      <div id="word-display" class="word-display">Waiting...</div>
      <div id="round-display" class="round-display"></div>
    </div>
    <div class="header-right">
      <div id="timer" class="timer">--</div>
      <button class="mob-panel-btn" id="mob-chat-btn" aria-label="Toggle chat">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </button>
    </div>
  </header>

  <main class="game-main">

    <div id="panel-backdrop"></div>

    <aside class="players-panel" id="players-panel">
      <div class="panel-body">
        <button class="btn-leave-room hidden" id="btn-leave-room" type="button">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Leave room
        </button>
        <div id="player-list"></div>
      </div>
      <button class="panel-toggle-btn" id="toggle-players" aria-label="Toggle players panel">
        <svg class="chevron-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
    </aside>

    <section class="canvas-section">
      <div class="canvas-wrapper">
        <canvas id="game-canvas" width="800" height="550"></canvas>

        <div id="word-picker" class="word-picker hidden">
          <h3>Pick a word to draw:</h3>
          <div id="word-options" class="word-options"></div>
        </div>

        <div id="turn-overlay" class="turn-overlay hidden">
          <p id="turn-overlay-text"></p>
          <div id="play-again-controls" class="hidden" style="display:flex;flex-direction:column;align-items:center;gap:.6rem;">
            <label style="font-size:.85rem;color:var(--muted);display:flex;align-items:center;gap:.5rem;">
              Rounds
              <select id="rounds-select-game" style="background:var(--card);color:var(--text);border:none;border-radius:6px;padding:.3rem .6rem;font-size:.9rem;">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3" selected>3</option>
                <option value="4">4</option>
                <option value="5">5</option>
              </select>
            </label>
            <label style="font-size:.85rem;color:var(--muted);display:flex;align-items:center;gap:.5rem;">
              Difficulty
              <select id="difficulty-select-game" style="background:var(--card);color:var(--text);border:none;border-radius:6px;padding:.3rem .6rem;font-size:.9rem;">
                <option value="easy">Easy</option>
                <option value="medium" selected>Medium</option>
                <option value="hard">Hard</option>
                <option value="mixed">Mixed</option>
              </select>
            </label>
            <button id="btn-play-again" class="btn btn-primary">Play Again</button>
          </div>
        </div>
      </div>

      <div class="toolbar" id="toolbar">

        <!-- Mobile-only swatch trigger -->
        <button class="color-picker-trigger" id="color-picker-trigger" type="button" aria-label="Pick color">
          <span class="current-color" id="current-color"></span>
        </button>

        <!-- ① Colour group -->
        <div class="tb-group tb-color-group" id="tb-color-group">
          <div id="color-swatches"></div>
          <label class="tb-custom-picker" data-hint="Custom color">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 2C6.48 2 2 6.48 2 12C2 14.5 3.1 16.74 4.84 18.3C5.63 19.03 6.75 18.36 6.75 17.28V17C6.75 16.31 7.31 15.75 8 15.75C8.69 15.75 9.25 16.31 9.25 17V17.5C9.25 18.19 9.81 18.75 10.5 18.75H13.5C14.19 18.75 14.75 18.19 14.75 17.5V17C14.75 16.31 15.31 15.75 16 15.75C16.69 15.75 17.25 16.31 17.25 17V17.28C17.25 18.36 18.37 19.03 19.16 18.3C20.9 16.74 22 14.5 22 12C22 6.48 17.52 2 12 2Z" fill="url(#cpg)"/>
              <circle cx="8.5" cy="10" r="1.5" fill="rgba(255,255,255,0.9)"/>
              <circle cx="12" cy="7.5" r="1.5" fill="rgba(255,255,255,0.9)"/>
              <circle cx="15.5" cy="10" r="1.5" fill="rgba(255,255,255,0.9)"/>
              <defs>
                <linearGradient id="cpg" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
                  <stop offset="0%" stop-color="#f87171"/>
                  <stop offset="25%" stop-color="#facc15"/>
                  <stop offset="50%" stop-color="#34d399"/>
                  <stop offset="75%" stop-color="#38bdf8"/>
                  <stop offset="100%" stop-color="#e879f9"/>
                </linearGradient>
              </defs>
            </svg>
            <input type="color" id="custom-color" value="#000000" />
          </label>
        </div>

        <div class="tb-sep"></div>

        <!-- ② Tools -->
        <div class="tb-group tb-tool-group">
          <button class="tb-tool-btn active" id="btn-pen" data-hint="Pen"><i class="ti ti-pencil" aria-hidden="true"></i></button>
          <button class="tb-tool-btn" id="btn-eraser" data-hint="Eraser"><i class="ti ti-eraser" aria-hidden="true"></i></button>
          <button class="tb-tool-btn" id="btn-fill" data-hint="Fill"><i class="ti ti-droplet" aria-hidden="true"></i></button>
        </div>

        <div class="tb-sep"></div>

        <!-- ③ Size -->
        <div class="tb-group tb-size-group">
          <i class="ti ti-circle-filled tb-dot-sm" aria-hidden="true"></i>
          <input type="range" id="brush-size" min="2" max="40" value="6" />
          <i class="ti ti-circle-filled tb-dot-lg" aria-hidden="true"></i>
          <span class="tb-sz-val" id="brush-size-val">6</span>
        </div>

        <div class="tb-spacer"></div>

        <!-- ④ Actions -->
        <div class="tb-group tb-action-group">
          <button class="tb-act-btn" id="btn-undo" data-hint="Undo"><i class="ti ti-arrow-back-up" aria-hidden="true"></i></button>
          <button class="tb-act-btn tb-act-danger" id="btn-clear" data-hint="Clear"><i class="ti ti-trash" aria-hidden="true"></i></button>
        </div>

      </div>
    </section>

    <aside class="chat-panel" id="chat-panel">
      <button class="panel-toggle-btn" id="toggle-chat" aria-label="Toggle chat panel">
        <svg class="chevron-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>
      <div class="panel-body">
        <div id="chat-messages" class="chat-messages"></div>
        <form id="chat-form" class="chat-form">
          <input id="chat-input" type="text" placeholder="Type your guess..." maxlength="100" autocomplete="off" />
          <button type="submit" class="btn btn-primary">Send</button>
        </form>
      </div>
    </aside>

  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/canvas.js"></script>
  <script src="/js/game.js"></script>
</body>
</html>
