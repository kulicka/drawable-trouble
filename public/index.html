<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drawable Trouble</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Bricolage+Grotesque:opsz,wght@12..96,700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .hidden { display: none !important; }

    body {
      min-height: 100vh;
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      color: #fff;
      padding: 2rem 1rem;
    }

    /* ── Ambient orbs ── */
    .orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    .orb1 { width: 600px; height: 600px; background: #2d1a35; top: -180px; right: -120px; opacity: 0.7; }
    .orb2 { width: 380px; height: 380px; background: #1a0f22; bottom: -100px; left: -80px; opacity: 0.9; }

    /* ── Layout ── */
    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 440px;
    }

    /* ── Brand ── */
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      margin-bottom: 2.5rem;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-mark {
      width: 54px;
      height: 54px;
      background: #1f1020;
      border: 1px solid #e879f955;
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.3s;
    }

    .brand-name {
      font-family: 'Alex Brush', cursive;
      font-size: 58px;
      font-weight: 400;
      line-height: 1.1;
      color: #e879f9;
      letter-spacing: 0.5px;
      white-space: nowrap;
      transition: color 0.3s;
    }

    .tagline {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      text-align: center;
    }

    /* ── Cards ── */
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 22px;
      padding: 2rem;
      width: 100%;
      margin-bottom: 0;
    }

    .card-heading {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 19px;
      font-weight: 700;
      color: #fff;
      text-align: center;
      margin-bottom: 1.25rem;
    }

    /* ── Room code copy button ── */
    .room-code-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .copy-btn {
      width: 34px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 9px;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      padding: 0;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      position: relative;
    }
    .copy-btn:hover {
      background: rgba(255,255,255,0.12);
      color: #fff;
    }
    .copy-btn:active { transform: scale(0.95); }
    .copy-btn.copied {
      background: rgba(74, 222, 128, 0.18);
      border-color: rgba(74, 222, 128, 0.45);
      color: #4ade80;
    }
    .copy-icon { display: block; }
    .copy-btn .icon-check { display: none; }
    .copy-btn.copied .icon-copy { display: none; }
    .copy-btn.copied .icon-check { display: block; }

    /* ── Inputs ── */
    .text-input {
      width: 100%;
      height: 48px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      padding: 0 16px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 1rem;
      display: block;
    }
    .text-input::placeholder { color: rgba(255,255,255,0.28); }
    .text-input:focus { border-color: rgba(232,121,249,0.55); }

    /* ── Color swatches ── */
    .swatches {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 8px;
      margin-bottom: 1.5rem;
    }

    .swatch {
      aspect-ratio: 1;
      border-radius: 50%;
      border: 2.5px solid transparent;
      cursor: pointer;
      width: 100%;
      transition: transform 0.12s, border-color 0.12s;
      position: relative;
      background: none;
      padding: 0;
    }
    .swatch:hover { transform: scale(1.2); }
    .swatch.active { border-color: #fff; transform: scale(1.15); }
    .swatch.active::after {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin: 0 0 1.5rem;
    }

    /* ── Buttons ── */
    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn {
      height: 50px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Bricolage Grotesque', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: transform 0.15s, opacity 0.15s;
      color: #fff;
    }
    .btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn:active { transform: scale(0.97); }

    .btn-primary { background: #e879f9; }
    .btn-secondary {
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.18);
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.14); }
    .btn-full { grid-column: 1 / -1; }

    /* ── Waiting step extras ── */
    #player-list {
      list-style: none;
      margin-bottom: 1rem;
    }
    #player-list li {
      padding: .45rem .7rem;
      margin-bottom: .35rem;
      border-radius: 8px;
      font-size: .9rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .waiting-hint {
      font-size: .85rem;
      color: rgba(255,255,255,0.4);
      margin-bottom: 1rem;
      text-align: center;
    }

    .host-controls {
      display: flex;
      flex-direction: column;
      gap: .85rem;
      margin-bottom: 1rem;
    }

    .control-group { display: flex; flex-direction: column; gap: .4rem; }

    .control-label {
      font-size: .8rem;
      letter-spacing: .04em;
      color: rgba(255,255,255,0.5);
      padding-left: 2px;
    }

    .option-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 11px;
      padding: 4px;
    }

    .option-btn {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.65);
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: .6rem 0;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, transform 0.1s;
      min-height: 36px;
    }
    .option-btn:hover { background: rgba(255,255,255,0.06); color: #fff; }
    .option-btn:active { transform: scale(0.97); }
    .option-btn.active {
      background: rgba(232,121,249,0.18);
      color: #f0abfc;
      box-shadow: inset 0 0 0 1px rgba(232,121,249,0.35);
    }

    /* ── Error ── */
    #error-msg {
      margin-top: 1rem;
      font-size: .9rem;
      color: #f87171;
      text-align: center;
      min-height: 1.2em;
    }

    /* ── Back-to-lobby link ── */
    .leave-link {
      display: block; width: 100%;
      background: none; border: none;
      color: rgba(255,255,255,0.45);
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 13px; font-weight: 600;
      padding: .6rem; margin-top: .5rem;
      cursor: pointer; text-align: center;
      transition: color 0.15s;
    }
    .leave-link:hover { color: #fff; }
    .leave-link:active { color: #e879f9; }

    /* ── Footer ── */
    .footer {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 11px;
      color: rgba(255,255,255,0.25);
    }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      body { align-items: flex-start; padding: 1.5rem 1rem 2rem; }
      .orb1 { width: 380px; height: 380px; top: -120px; right: -80px; }
      .orb2 { width: 260px; height: 260px; bottom: -60px; left: -50px; }

      .brand { margin-bottom: 1.5rem; }
      .logo-row { gap: 10px; }
      .logo-mark { width: 44px; height: 44px; border-radius: 12px; }
      .logo-mark svg { width: 30px; height: 30px; }
      .brand-name { font-size: clamp(34px, 9.5vw, 42px); }
      .tagline { font-size: 10px; }

      .card { padding: 1.5rem 1.25rem; border-radius: 18px; }
      .card-heading { font-size: 17px; margin-bottom: 1rem; }
      .text-input { height: 46px; font-size: 16px; }

      .swatches { gap: 6px; margin-bottom: 1.25rem; }
      .divider { margin-bottom: 1.25rem; }

      .btn { height: 48px; font-size: 14px; }

      #player-list li { padding: .55rem .8rem; }

      .host-controls { gap: .7rem; }
      .option-btn { font-size: 13px; padding: .55rem 0; min-height: 38px; }

      .footer { margin-top: 1rem; }
    }
</style>
</head>
<body>

  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <div class="container">

    <!-- Brand -->
    <div class="brand">
      <div class="logo-row">
        <div class="logo-mark" id="logoMark">
          <svg width="36" height="36" viewBox="0 0 52 52" fill="none" aria-hidden="true">
            <path id="starGlow" d="M26 8 L29 20 L41 20 L31 28 L35 40 L26 33 L17 40 L21 28 L11 20 L23 20 Z" fill="#e879f9" opacity="0.25"/>
            <path id="starFill" d="M26 12 L28.5 21 L38 21 L30.5 26.5 L33 36 L26 30.5 L19 36 L21.5 26.5 L14 21 L23.5 21 Z" fill="#e879f9"/>
            <path d="M10 14 Q14 10 16 14" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" fill="none"/>
            <path d="M36 38 Q40 34 42 38" stroke="#f9a8d4" stroke-width="2" stroke-linecap="round" fill="none"/>
            <circle cx="10" cy="36" r="2" fill="#a78bfa"/>
            <circle cx="42" cy="14" r="2" fill="#f9a8d4"/>
          </svg>
        </div>
        <span class="brand-name" id="brandName">Drawable Trouble</span>
      </div>
      <span class="tagline">Draw it · Guess it · Win it</span>
    </div>

    <!-- Name step -->
    <div class="card" id="name-step">
      <p class="card-heading">What's your name?</p>

      <input
        class="text-input"
        type="text"
        id="player-name"
        maxlength="20"
        placeholder="Your name..."
        autocomplete="off"
        autofocus
      />

      <div class="swatches" id="swatch-container" role="group" aria-label="Player color"></div>

      <div class="divider"></div>

      <div class="btn-row">
        <button class="btn btn-primary" id="btn-create">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Create room
        </button>
        <button class="btn btn-secondary" id="btn-join-toggle">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          Join room
        </button>
      </div>
    </div>

    <!-- Join step -->
    <div class="card hidden" id="join-step">
      <p class="card-heading">Enter room code</p>
      <input
        class="text-input"
        type="text"
        id="room-code"
        maxlength="5"
        placeholder="XXXXX"
        style="text-transform:uppercase;letter-spacing:.2em;text-align:center;"
        autocomplete="off"
      />
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-join">Join</button>
        <button class="btn btn-secondary" id="btn-back">Back</button>
      </div>
    </div>

    <!-- Waiting step -->
    <div class="card hidden" id="waiting-step">
      <div class="card-heading room-code-row">
        <span>Room <span id="display-code"></span></span>
        <button id="btn-copy-code" class="copy-btn" type="button" aria-label="Copy room code" title="Copy code">
          <svg class="copy-icon icon-copy" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          <svg class="copy-icon icon-check" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </button>
      </div>
      <p class="waiting-hint">Share this code with friends!</p>
      <ul id="player-list"></ul>
      <div id="host-controls" class="host-controls hidden">
        <div class="control-group">
          <span class="control-label">Rounds</span>
          <div class="option-row" id="rounds-options" role="radiogroup" aria-label="Number of rounds">
            <button type="button" class="option-btn" data-value="3">3</button>
            <button type="button" class="option-btn active" data-value="5">5</button>
            <button type="button" class="option-btn" data-value="7">7</button>
            <button type="button" class="option-btn" data-value="10">10</button>
          </div>
        </div>
        <div class="control-group">
          <span class="control-label">Difficulty</span>
          <div class="option-row" id="difficulty-options" role="radiogroup" aria-label="Difficulty">
            <button type="button" class="option-btn" data-value="easy">Easy</button>
            <button type="button" class="option-btn" data-value="medium">Medium</button>
            <button type="button" class="option-btn" data-value="hard">Hard</button>
            <button type="button" class="option-btn active" data-value="mixed">Mixed</button>
          </div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary btn-full hidden" id="btn-start">Start Game</button>
      </div>
      <p id="waiting-msg" class="waiting-hint">Waiting for the host to start...</p>
      <button id="btn-leave-waiting" class="leave-link" type="button">← Back to lobby</button>
    </div>

    <p id="error-msg" class="hidden"></p>

    <p class="footer">No account needed · Start instantly</p>

  </div>

  <!-- Hidden input for lobby.js color compatibility -->
  <input type="hidden" id="player-color" value="#e879f9" />

  <script>
    (function () {
      const COLORS = [
        '#f87171', '#fb923c', '#fbbf24', '#facc15',
        '#a3e635', '#34d399', '#2dd4bf', '#38bdf8',
        '#60a5fa', '#818cf8', '#a78bfa', '#e879f9',
        '#f472b6', '#fb7185', '#94a3b8', '#e2e8f0',
      ];

      const savedColor = localStorage.getItem('playerColor');
      const savedIdx = savedColor ? COLORS.indexOf(savedColor) : -1;
      let activeIdx = savedIdx !== -1 ? savedIdx : 11; // default: fuchsia

      const colorInput  = document.getElementById('player-color');
      const brandName   = document.getElementById('brandName');
      const starFill    = document.getElementById('starFill');
      const starGlow    = document.getElementById('starGlow');
      const btnCreate   = document.getElementById('btn-create');
      const logoMark    = document.getElementById('logoMark');

      function applyColor(color) {
        colorInput.value                  = color;
        brandName.style.color             = color;
        starFill.setAttribute('fill', color);
        starGlow.setAttribute('fill', color);
        btnCreate.style.background        = color;
        logoMark.style.borderColor        = color + '55';
      }

      const swatchContainer = document.getElementById('swatch-container');
      COLORS.forEach((color, i) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'swatch' + (i === activeIdx ? ' active' : '');
        btn.style.background = color;
        btn.setAttribute('aria-label', 'Color ' + (i + 1));
        btn.addEventListener('click', () => {
          activeIdx = i;
          document.querySelectorAll('.swatch').forEach((s, idx) => s.classList.toggle('active', idx === i));
          applyColor(color);
          localStorage.setItem('playerColor', color);
        });
        swatchContainer.appendChild(btn);
      });

      applyColor(COLORS[activeIdx]);
    })();
  </script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/lobby.js"></script>
</body>
</html>
